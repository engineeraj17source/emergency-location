<!DOCTYPE html>
<html>
<head>
  <title>Emergency Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .panel {
      position: absolute;
      top: 20px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 1000;
      width: 250px;
    }

    input {
      width: 220px;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      margin: 3px 0;
      padding: 6px;
      cursor: pointer;
    }

    .green { background: green; color: white; }
    .gray { background: gray; color: white; }

    #userList {
      max-height: 220px;
      overflow-y: auto;
      font-size: 12px;
      border-top: 1px solid #ddd;
      margin-top: 8px;
    }

    .user-item {
      padding: 5px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .user-item:hover {
      background: #f2f2f2;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<div class="panel">

  <b>Admin Panel</b><br><br>

  <input id="reqIdInput" placeholder="Req ID">
  <input id="latInput" placeholder="Latitude">
  <input id="lonInput" placeholder="Longitude">

  <button onclick="addManualLocation()">Add Location</button>

  <hr>

  <!-- 🔥 SINGLE BUTTON -->
  <button onclick="generateAndCopyLink()">
    Generate & Copy Link
  </button>

  <p id="linkText" style="font-size:12px; word-break: break-all;"></p>

  <button id="fetchBtn" class="gray" onclick="fetchLatest()">
    Fetch Location
  </button>

  <hr>

  <b>User Status</b>
  <div id="userList"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([28.6139, 77.2090], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const markers = {};
const colors = ["red","blue","green","orange","purple"];
const reqColorMap = {};

let generatedLink = "";
let userLastSeen = {};

function getColor(id){
  if(!reqColorMap[id]){
    const i = Object.keys(reqColorMap).length % colors.length;
    reqColorMap[id] = colors[i];
  }
  return reqColorMap[id];
}

function createIcon(color){
  return L.icon({
    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25,41],
    iconAnchor: [12,41]
  });
}

//
// 🔗 GENERATE + COPY LINK
//
async function generateAndCopyLink() {
  const res = await fetch('/generate');
  const data = await res.json();

  generatedLink = data.link;

  document.getElementById("linkText").innerText = generatedLink;

  try {
    const url = new URL(generatedLink);
    const token = url.searchParams.get("token");
    if (token) localStorage.setItem("token", token);
  } catch (e) {}

  await navigator.clipboard.writeText(generatedLink);
  alert("Link generated & copied!");
}

//
// 📍 FETCH LATEST LOCATION
//
async function fetchLatest() {
  const res = await fetch('/locations', {
    headers: {
      Authorization: localStorage.getItem("token")
    }
  });

  const data = await res.json();

  if (!Array.isArray(data)) return;

  const latest = [...data].reverse().find(l => l.lat && l.lon);

  if (!latest) return;

  document.getElementById("fetchBtn").classList.remove("gray");
  document.getElementById("fetchBtn").classList.add("green");

  const pos = [latest.lat, latest.lon];

  if (markers["_latest"]) {
    markers["_latest"].setLatLng(pos);
  } else {
    markers["_latest"] = L.marker(pos).addTo(map);
  }

  map.setView(pos, 16);
}

//
// 🔥 MANUAL ENTRY
//
async function addManualLocation() {
  const reqId = document.getElementById("reqIdInput").value;
  const lat = parseFloat(document.getElementById("latInput").value);
  const lon = parseFloat(document.getElementById("lonInput").value);

  if (!reqId || isNaN(lat) || isNaN(lon)) return;

  await fetch('/location', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': localStorage.getItem("token")
    },
    body: JSON.stringify({
      lat,
      lon,
      reqId,
      manual: true,
      source: "ADMIN"
    })
  });

  alert("Added");
}

//
// 📡 LIVE TRACKING (UNCHANGED CORE)
//
async function loadLocations() {
  const res = await fetch('/locations', {
    headers: {
      Authorization: localStorage.getItem("token")
    }
  });

  const data = await res.json();

  if (!Array.isArray(data)) return;

  updateUserPanel(data);

  data.forEach(loc => {
    if (loc.event === "DISCONNECTED") return;

    const id = loc.reqId || "unknown";
    const latlng = [loc.lat, loc.lon];
    const color = getColor(id);

    userLastSeen[id] = loc.time || Date.now();

    if (markers[id]) {
      markers[id].setLatLng(latlng);
    } else {
      const marker = L.marker(latlng, {
        icon: createIcon(color)
      }).addTo(map);

      marker.bindPopup(
        `Req: ${id}<br>Type: ${loc.type || "GPS"}<br>Source: ${loc.source || "USER"}`
      );

      markers[id] = marker;
    }
  });
}

setInterval(loadLocations, 3000);
loadLocations();

//
// 👥 USER PANEL
//
function updateUserPanel(data) {
  const panel = document.getElementById("userList");

  if (!Array.isArray(data)) return;

  const sorted = Object.keys(userLastSeen)
    .sort((a, b) => new Date(userLastSeen[b]) - new Date(userLastSeen[a]));

  panel.innerHTML = "";

  sorted.forEach(id => {
    const div = document.createElement("div");
    div.className = "user-item";

    div.innerHTML = `
      <b>${id}</b><br>
      <small>${new Date(userLastSeen[id]).toLocaleTimeString()}</small>
    `;

    div.onclick = () => {
      if (markers[id]) {
        map.setView(markers[id].getLatLng(), 16);
        markers[id].openPopup();
      }
    };

    panel.appendChild(div);
  });
}
</script>

</body>
</html>
