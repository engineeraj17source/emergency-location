<!DOCTYPE html>
<html>
<head>
  <title>Emergency Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .panel {
      position: absolute;
      top: 20px;
      left: 10px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      z-index: 1000;
      width: 220px;
    }

    input {
      width: 200px;
      margin-bottom: 5px;
    }

    button {
      margin: 4px 0;
      padding: 6px;
      width: 100%;
      cursor: pointer;
    }

    .green {
      background: green;
      color: white;
    }

    .gray {
      background: gray;
      color: white;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<div class="panel">

  <b>Admin Manual Entry</b><br><br>

  <input id="reqIdInput" placeholder="Req ID"><br>
  <input id="latInput" placeholder="Latitude"><br>
  <input id="lonInput" placeholder="Longitude"><br>

  <button onclick="addManualLocation()">Add Location</button>

  <hr>

  <button onclick="generateLink()">Generate Link</button>
  <p id="linkText" style="font-size:12px;"></p>

  <button id="fetchBtn" class="gray" onclick="fetchLatestLocation()">
    Fetch Location
  </button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([28.6139, 77.2090], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const markers = {};
const colors = ["red","blue","green","orange","purple"];
const reqColorMap = {};

let latestData = [];

function getColor(id){
  if(!reqColorMap[id]){
    const i = Object.keys(reqColorMap).length % colors.length;
    reqColorMap[id] = colors[i];
  }
  return reqColorMap[id];
}

function createIcon(color){
  return L.icon({
    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25,41],
    iconAnchor: [12,41]
  });
}

//
// 🔥 1. GENERATE LINK
//
async function generateLink() {
  const res = await fetch('/generate');
  const data = await res.json();

  document.getElementById("linkText").innerText = data.link;
}

//
// 📍 2. FETCH LATEST LOCATION (BUTTON LOGIC)
//
async function fetchLatestLocation() {
  const res = await fetch('/locations');
  const data = await res.json();

  if (!data.length) {
    alert("No location found");
    return;
  }

  latestData = data;

  // 🟢 turn button green
  const btn = document.getElementById("fetchBtn");
  btn.classList.remove("gray");
  btn.classList.add("green");

  // get latest valid location
  const latest = [...data].reverse().find(l => l.lat && l.lon);

  if (latest) {
    const pos = [latest.lat, latest.lon];

    if (markers["_latest"]) {
      markers["_latest"].setLatLng(pos);
    } else {
      markers["_latest"] = L.marker(pos).addTo(map);
    }

    map.setView(pos, 16);
    markers["_latest"].bindPopup(
      `Latest Location<br>Req: ${latest.reqId}`
    ).openPopup();
  }
}

//
// 🔥 ADMIN MANUAL ENTRY (UNCHANGED)
//
async function addManualLocation() {
  const reqId = document.getElementById("reqIdInput").value;
  const lat = parseFloat(document.getElementById("latInput").value);
  const lon = parseFloat(document.getElementById("lonInput").value);

  if (!reqId || isNaN(lat) || isNaN(lon)) {
    alert("Enter valid values");
    return;
  }

  await fetch('/location', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      lat,
      lon,
      reqId,
      manual: true,
      source: "ADMIN"
    })
  });

  alert("Manual location added");
}

//
// 📡 LIVE AUTO UPDATE (YOUR ORIGINAL LOGIC)
//
async function loadLocations(){
  const res = await fetch('/locations');
  const data = await res.json();

  data.forEach(loc => {
    if(loc.event === "DISCONNECTED") return;

    const id = loc.reqId || "unknown";
    const latlng = [loc.lat, loc.lon];
    const color = getColor(id);

    if(markers[id]){
      markers[id].setLatLng(latlng);
    } else {
      const marker = L.marker(latlng, {
        icon: createIcon(color)
      }).addTo(map);

      marker.bindPopup(
        `Req: ${id}<br>Type: ${loc.type || "GPS"}<br>Source: ${loc.source || "USER"}`
      );

      markers[id] = marker;
      map.setView(latlng, 15);
    }
  });
}

setInterval(loadLocations, 3000);
loadLocations();

</script>

</body>
</html>
