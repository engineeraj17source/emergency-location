<!DOCTYPE html>
<html>
<head>
  <title>Emergency Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #map { height: 100vh; width: 100%; }

    .panel {
      position: absolute;
      top: 20px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 1000;
      width: 260px;
    }

    input {
      width: 230px;
      margin-bottom: 5px;
    }

    button {
      width: 100%;
      margin: 3px 0;
      padding: 6px;
      cursor: pointer;
    }

    .green { background: green; color: white; }
    .gray { background: gray; color: white; }

    #userList {
      max-height: 240px;
      overflow-y: auto;
      font-size: 12px;
      border-top: 1px solid #ddd;
      margin-top: 8px;
    }

    .user-item {
      padding: 6px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .user-item:hover {
      background: #f2f2f2;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<div class="panel">

  <b>Admin Panel</b><br><br>

  <input id="reqIdInput" placeholder="Req ID">
  <input id="latInput" placeholder="Latitude">
  <input id="lonInput" placeholder="Longitude">

  <button onclick="addManualLocation()">Add Location</button>

  <hr>

  <button onclick="generateAndCopyLink()">Generate & Copy Link</button>

  <p id="linkText" style="font-size:12px; word-break: break-all;"></p>

  <button id="fetchBtn" class="gray" onclick="fetchLatest()">
    Fetch Location
  </button>

  <hr>

  <b>User Status</b>
  <div id="userList"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([28.6139, 77.2090], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const markers = {};
const colors = ["red","blue","green","orange","purple"];
const reqColorMap = {};

let generatedLink = "";
let userLastSeen = {};
let userCoords = {};
let hiddenUsers = new Set();

function getColor(id){
  if(!reqColorMap[id]){
    const i = Object.keys(reqColorMap).length % colors.length;
    reqColorMap[id] = colors[i];
  }
  return reqColorMap[id];
}

function createIcon(color){
  return L.icon({
    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`,
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25,41],
    iconAnchor: [12,41]
  });
}

// 🔗 Generate + Copy Link
async function generateAndCopyLink() {
  const res = await fetch('/generate');
  const data = await res.json();

  generatedLink = data.link;
  document.getElementById("linkText").innerText = generatedLink;

  try {
    const url = new URL(generatedLink);
    const token = url.searchParams.get("token");
    if (token) localStorage.setItem("token", token);
  } catch (e) {}

  await navigator.clipboard.writeText(generatedLink);
  alert("Link generated & copied!");
}

// 📍 Fetch Latest
async function fetchLatest() {
  const res = await fetch('/locations');
  const data = await res.json();

  if (!Array.isArray(data)) return;

  const latest = [...data].reverse().find(l => l.lat && l.lon);
  if (!latest) return;

  document.getElementById("fetchBtn").classList.remove("gray");
  document.getElementById("fetchBtn").classList.add("green");

  const pos = [latest.lat, latest.lon];

  if (markers["_latest"]) {
    markers["_latest"].setLatLng(pos);
  } else {
    markers["_latest"] = L.marker(pos).addTo(map);
  }

  map.setView(pos, 16);
}

// 🔥 Manual Entry
async function addManualLocation() {
  const reqId = document.getElementById("reqIdInput").value;
  const lat = parseFloat(document.getElementById("latInput").value);
  const lon = parseFloat(document.getElementById("lonInput").value);

  if (!reqId || isNaN(lat) || isNaN(lon)) return;

  await fetch('/location', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      lat,
      lon,
      reqId,
      manual: true,
      source: "ADMIN"
    })
  });

  alert("Added");
}

// 🗑️ Remove (non-permanent)
function removeUser(id) {
  hiddenUsers.add(id);

  if (markers[id]) {
    map.removeLayer(markers[id]);
    delete markers[id];
  }

  updateUserPanel();
}

// 📋 Copy functions
function copyLat(id) {
  const val = userCoords[id]?.lat;
  if (val === undefined) return alert("No latitude");
  navigator.clipboard.writeText(val.toString());
  alert("Latitude copied: " + val);
}

function copyLon(id) {
  const val = userCoords[id]?.lon;
  if (val === undefined) return alert("No longitude");
  navigator.clipboard.writeText(val.toString());
  alert("Longitude copied: " + val);
}

// 📡 Live tracking
async function loadLocations() {
  const res = await fetch('/locations');
  const data = await res.json();

  if (!Array.isArray(data)) return;

  data.forEach(loc => {
    if (loc.event === "DISCONNECTED") return;

    const id = loc.reqId || "unknown";

    userLastSeen[id] = loc.time || Date.now();

    if (typeof loc.lat === "number" && typeof loc.lon === "number") {

      userCoords[id] = { lat: loc.lat, lon: loc.lon };

      // restore if user sends data again
      hiddenUsers.delete(id);

      if (hiddenUsers.has(id)) return;

      const latlng = [loc.lat, loc.lon];
      const color = getColor(id);

      if (markers[id]) {
        markers[id].setLatLng(latlng);
      } else {
        const marker = L.marker(latlng, {
          icon: createIcon(color)
        }).addTo(map);

        marker.bindPopup(
          `Req: ${id}<br>Lat: ${loc.lat}<br>Lon: ${loc.lon}`
        );

        markers[id] = marker;
      }
    }
  });

  updateUserPanel();
}

setInterval(loadLocations, 3000);
loadLocations();

// 👥 User panel
function updateUserPanel() {
  const panel = document.getElementById("userList");

  const sorted = Object.keys(userLastSeen)
    .sort((a, b) => new Date(userLastSeen[b]) - new Date(userLastSeen[a]));

  panel.innerHTML = "";

  sorted.forEach(id => {
    if (hiddenUsers.has(id)) return;

    const div = document.createElement("div");
    div.className = "user-item";

    const lat = userCoords[id]?.lat ?? "-";
    const lon = userCoords[id]?.lon ?? "-";

    div.innerHTML = `
      <b>${id}</b><br>
      <small>${new Date(userLastSeen[id]).toLocaleTimeString()}</small><br>
      <small>Lat: ${lat}</small><br>
      <small>Lon: ${lon}</small>

      <button style="background:green;color:white;">Copy Lat</button>
      <button style="background:blue;color:white;">Copy Lon</button>
      <button style="background:red;color:white;">Remove</button>
    `;

    div.onclick = () => {
      if (markers[id]) {
        map.setView(markers[id].getLatLng(), 16);
        markers[id].openPopup();
      }
    };

    const btns = div.querySelectorAll("button");

    btns[0].onclick = (e) => {
      e.stopPropagation();
      copyLat(id);
    };

    btns[1].onclick = (e) => {
      e.stopPropagation();
      copyLon(id);
    };

    btns[2].onclick = (e) => {
      e.stopPropagation();
      removeUser(id);
    };

    panel.appendChild(div);
  });
}
</script>

</body>
</html>
