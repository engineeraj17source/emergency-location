<!DOCTYPE html>
<html>
<head>
  <title>Emergency Location Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f8f8f8;
    }

    button {
      background: red;
      color: white;
      font-size: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      margin: 10px;
      cursor: pointer;
    }

    #smsBtn {
      background: #2563eb;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>📍 Emergency Location Tracker</h2>

<button onclick="startTracking()">START SHARING</button>
<button onclick="stopTracking()">STOP SHARING</button>
<button id="smsBtn" onclick="sendSMS()">SEND SMS</button>

<p id="status"></p>

<script>
const BASE_URL = "https://emergency-location.onrender.com";

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

let watchId = null;
let lastLat = null;
let lastLon = null;
let lastAcc = null;
let tracking = false;

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

// ❌ Block if no token
if (!token) {
  setStatus("❌ Invalid or expired link");
}


// 🟢 START
function startTracking() {
  if (!token) return;
  if (tracking) return;

  tracking = true;
  setStatus("Starting tracking...");

  watchId = navigator.geolocation.watchPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy;

      lastLat = lat;
      lastLon = lon;
      lastAcc = acc;

      // ⚠️ accuracy warning logic
      let qualityMsg = "";
      if (acc > 100) {
        qualityMsg = "\n⚠️ Low GPS accuracy";
      } else if (acc > 50) {
        qualityMsg = "\n🟡 Medium GPS accuracy";
      } else {
        qualityMsg = "\n🟢 High GPS accuracy";
      }

      setStatus(
`TRACKING ACTIVE

Lat: ${lat}
Lon: ${lon}
Accuracy: ±${acc}m${qualityMsg}`
      );

      fetch(`${BASE_URL}/location`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": token
        },
        body: JSON.stringify({
          lat,
          lon,
          accuracy: acc   // ✅ added
        })
      });
    },
    function() {
      setStatus("⚠️ GPS error. Enable location.");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );

  fetch(`${BASE_URL}/start`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    }
  });
}


// 🔴 STOP
function stopTracking() {
  if (!token) return;

  tracking = false;
  navigator.geolocation.clearWatch(watchId);

  setStatus("🛑 Tracking stopped");

  fetch(`${BASE_URL}/stop`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    }
  });
}


// 📩 SMS
function sendSMS() {
  let lat = lastLat || "NA";
  let lon = lastLon || "NA";
  let acc = lastAcc ? `±${lastAcc}m` : "NA";

  const message =
`EMERGENCY ALERT
Lat: ${lat}
Lon: ${lon}
Accuracy: ${acc}
Time: ${new Date().toLocaleString()}`;

  window.location.href =
    `sms:+918076529930?body=${encodeURIComponent(message)}`;
}
</script>

</body>
</html>
