<!DOCTYPE html>
<html>
<head>
  <title>Send Location</title>
</head>
<body>
  <h2>Sending Location...</h2>

<script>
const reqId = "REQ_" + Math.floor(Math.random() * 10000);

// 🔥 IMPORTANT: Replace this with your Render URL
const BASE_URL = "https://emergency-location.onrender.com";

function sendLocation(position) {
  fetch(`${BASE_URL}/location`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      lat: position.coords.latitude,
      lon: position.coords.longitude,
      time: new Date(),
      reqId: reqId
    })
  })
  .catch(err => {
    console.log("Error sending location:", err);
  });
}

function errorHandler() {
  alert("Please enable GPS/location");
}

// GPS tracking
navigator.geolocation.watchPosition(
  sendLocation,
  errorHandler,
  {
    enableHighAccuracy: true
  }
);
</script>

</body>
</html>
